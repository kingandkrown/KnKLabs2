<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | King & Krown</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Roboto',sans-serif;
background:#000;
color:#fff;
line-height:1.6;
}

/* HEADER */

header{
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.logo{
height:80px;
transition:0.3s;
}

.logo:hover{
transform:scale(1.05);
opacity:0.9;
}

/* PAGE HERO */

.hero{
text-align:center;
padding:80px 20px 40px;
}

.hero h1{
font-family:'Orbitron',sans-serif;
font-size:3rem;
letter-spacing:2px;
margin-bottom:20px;
}

.hero p{
max-width:600px;
margin:auto;
opacity:0.8;
font-size:1.1rem;
}

/* CONTACT FORM */

.contact-container{
max-width:600px;
margin:60px auto;
padding:40px;
background:#0a0a0a;
border:1px solid #222;
border-radius:8px;
}

form{
display:flex;
flex-direction:column;
gap:18px;
}

input, textarea{
padding:14px;
background:#111;
border:1px solid #333;
color:#fff;
font-size:1rem;
border-radius:6px;
font-family:'Roboto',sans-serif;
}

input:focus, textarea:focus{
outline:none;
border-color:#fff;
}

textarea{
resize:none;
}

/* BUTTON */

.btn{
padding:14px 30px;
border:1px solid #fff;
background:transparent;
color:#fff;
font-size:1rem;
cursor:pointer;
transition:0.3s;
border-radius:6px;
}

.btn:hover{
background:#fff;
color:#000;
}

/* CONTACT INFO */

.contact-info{
text-align:center;
margin-top:40px;
opacity:0.7;
}

/* FOOTER */

footer{
border-top:1px solid #222;
padding:40px;
text-align:center;
font-size:0.9rem;
margin-top:80px;
opacity:0.7;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:2.2rem;
}

.contact-container{
margin:40px 20px;
padding:30px;
}

}

</style>
</head>

<body>

<header>
<a href="index.html">
<img src="images/logo copy WHITE.png" class="logo">
</a>
</header>


<section class="hero">

<h1>CONTACT</h1>

<p>
For product inquiries, collaborations, or technology partnerships,
get in touch with King & Krown Technologies.
</p>

</section>


<div class="contact-container">

<form action="https://formspree.io/f/xojkvowl" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<textarea name="message" rows="5" placeholder="Your message"></textarea>

<button class="btn" type="submit">Send Message</button>

</form>

<div class="contact-info">

<p>Email: kingnkrown@gmail.com</p>

</div>

</div>


<footer>

<p>King & Krown Technologies</p>

</footer>

</body>
</html>
